name: Pack

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Package version. Defaults to 0.1.0-preview.<run-number>.
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "package_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.version }}" ]]; then
              echo "package_version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            else
              echo "package_version=0.1.0-preview.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "package_version=0.1.0-ci.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore
        run: dotnet restore Solster.Aspire.slnx

      - name: Build
        run: dotnet build Solster.Aspire.slnx --configuration Release --no-restore

      - name: Pack
        run: dotnet pack Solster.Aspire.slnx --configuration Release --no-build --output artifacts/packages /p:PackageVersion=${{ steps.version.outputs.package_version }}

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/packages/*.nupkg

      - name: Publish packages
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source https://nuget.pkg.github.com/solster/index.json --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
